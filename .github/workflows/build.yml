name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v6

      - name: Build binary wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "flipoff-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_PRERELEASE_PYTHON: "0"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
          CIBW_BEFORE_BUILD_LINUX: "pip install uv && uv sync --no-dev"

      - name: Build source tarball
        run: python -m pip install uv && uv sync --no-dev && python -m build --sdist --outdir dist/ .

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flipoff-wheels-py${{ matrix.python-version }}
          path: ./wheelhouse/*.whl
          retention-days: 14

      - name: Upload source tarball
        uses: actions/upload-artifact@v7
        with:
          name: flipoff-sdist
          path: ./dist/*.tar.gz
          retention-days: 14
